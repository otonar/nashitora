<!-- places/place_list.html -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Places</title>
  </head>
  <body>
    <h1>観光地一覧</h1>
    <ul>
      {% for place in places %}
      <li>
        <a href="{% url 'place_detail' place.pk %}">{{ place.name }}</a> - {{
        place.address }}
      </li>
      {% endfor %}
    </ul>
  </body>
</html>
