<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>エラー</title>
    <style>
        /* 全体スタイル */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f9f9f9;
            color: #333;
            margin: 0;
            padding: 0;
        }

        /* エラーメッセージのコンテナ */
        .container {
            width: 85%;
            max-width: 800px;
            margin: 0 auto;
            padding: 30px;
            text-align: center;
            background-color: white;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            margin-top: 50px;
            border-radius: 10px;
        }

        /* エラーメッセージ */
        .error-message {
            background-color: #ffcccc;
            color: #d8000c;
            border: 1px solid #d8000c;
            padding: 20px;
            border-radius: 8px;
            font-size: 18px;
        }

        /* ホームへ戻るボタン */
        .back-button {
            display: inline-block;
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }

        .back-button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>エラーが発生しました</h1>
    <div class="error-message">
        <p>{{ message }}</p>
    </div>
    <a href="/" class="back-button">ホームへ戻る</a>
</div>

</body>
</html>
